server:
  port: 8080

spring:
  application:
    name: health-blog-platform
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/health_blog_db}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:sa}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    repair-on-migrate: true

security:
  jwt:
    secret: ${SECURITY_JWT_SECRET:change-this-secret-to-a-long-random-production-value-32-bytes}
    access-token-minutes: ${SECURITY_JWT_ACCESS_TOKEN_MINUTES:15}
    refresh-token-days: ${SECURITY_JWT_REFRESH_TOKEN_DAYS:7}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:health-blog}